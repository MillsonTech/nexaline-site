<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaLine — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080C14;
  --surface:   #0F1624;
  --elevated:  #182030;
  --border:    rgba(255,255,255,0.07);
  --blue:      #1E6BFF;
  --blue-glow: rgba(30,107,255,0.25);
  --cyan:      #00D4FF;
  --green:     #10B981;
  --red:       #EF4444;
  --text:      #FFFFFF;
  --text-soft: #C8D6EF;
  --text-mute: #5A6A84;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Background glow */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, rgba(30,107,255,0.12), transparent 70%);
  pointer-events: none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-lockup {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}
.logo-mark {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: linear-gradient(135deg, #1E6BFF, #0044cc);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px; font-weight: 900;
  color: #fff;
  letter-spacing: -1px;
  box-shadow: 0 0 20px rgba(30,107,255,0.45);
  flex-shrink: 0;
}
.logo-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1;
}
.logo-name .nexa { color: #ffffff; }
.logo-name .line { color: #00D4FF; }
.logo-sub {
  font-size: 13px;
  color: var(--text-mute);
  margin-top: 8px;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--elevated);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-mute);
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 2px 12px var(--blue-glow);
}

/* Form */
.form { display: none; }
.form.active { display: block; }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-mute);
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}
.form-input::placeholder { color: var(--text-mute); }

/* Password wrapper */
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 44px; }
.pw-toggle {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-mute);
  cursor: pointer; padding: 4px;
  display: flex;
}
.pw-toggle svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 16px;
  display: none;
}
.alert.show { display: block; }
.alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #FF6B6B; }
.alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #34D399; }

/* Submit button */
.btn-submit {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: var(--blue);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  letter-spacing: -0.2px;
}
.btn-submit:hover {
  background: #2d7bff;
  box-shadow: 0 4px 20px var(--blue-glow);
  transform: translateY(-1px);
}
.btn-submit:disabled {
  opacity: 0.6; cursor: not-allowed; transform: none;
}

/* Divider */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text-mute); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  border-top: 1px solid var(--border);
}

/* OAuth buttons */
.oauth-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; width: 100%;
  padding: 11px; border-radius: 10px;
  background: var(--elevated);
  border: 1px solid var(--border);
  color: var(--text-soft);
  font-size: 14px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer; margin-bottom: 10px;
  transition: all 0.15s;
}
.oauth-btn:hover {
  border-color: rgba(255,255,255,0.15);
  background: var(--elevated);
  color: var(--text);
}
.oauth-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* Password strength */
.pw-strength {
  display: flex; gap: 4px; margin-top: 8px;
}
.pw-bar {
  height: 3px; flex: 1; border-radius: 99px;
  background: var(--border); transition: background 0.3s;
}
.pw-bar.weak   { background: var(--red); }
.pw-bar.medium { background: var(--amber, #F59E0B); }
.pw-bar.strong { background: var(--green); }

/* Terms */
.terms-row {
  display: flex; align-items: flex-start; gap: 10px;
  margin: 16px 0;
}
.terms-row input { margin-top: 2px; flex-shrink: 0; accent-color: var(--blue); }
.terms-row label { font-size: 12px; color: var(--text-mute); line-height: 1.5; }
.terms-row a { color: var(--blue); text-decoration: none; }

@media (max-width: 480px) {
  .card { padding: 28px 20px; border-radius: 16px; }
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-lockup">
      <div class="logo-mark">N</div>
      <div class="logo-name"><span class="nexa">Nexa</span><span class="line">Line</span></div>
    </div>
    <div class="logo-sub">Virtual numbers for every verification</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form active" id="form-login">
    <div id="login-alert" class="alert"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="login-password" placeholder="Your password" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePw('login-password', this)" type="button">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign In</button>
        <!-- Google Login -->
        <div style="margin:16px 0 0;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
            <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
            <span style="font-size:12px;color:#5A6A84;white-space:nowrap;">or continue with</span>
            <div style="flex:1;height:1px;background:rgba(255,255,255,0.07);"></div>
          </div>
          <a href="https://silver-giraffe-369149.hostingersite.com/api/auth/google"
             style="display:flex;align-items:center;justify-content:center;gap:10px;
                    width:100%;padding:13px;border-radius:10px;
                    background:#fff;color:#333;font-size:14px;font-weight:600;
                    text-decoration:none;cursor:pointer;
                    box-shadow:0 2px 8px rgba(0,0,0,0.2);">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </a>
        </div>

    <div class="divider">or continue with</div>
    
    <button class="oauth-btn" onclick="alert('Facebook login coming soon')">
      <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Continue with Facebook
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div class="form" id="form-register">
    <div id="register-alert" class="alert"></div>
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="reg-name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="tel" class="form-input" id="reg-phone" placeholder="e.g. 08012345678" autocomplete="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
        <button class="pw-toggle" onclick="togglePw('reg-password', this)" type="button">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="pw-strength">
        <div class="pw-bar" id="bar1"></div>
        <div class="pw-bar" id="bar2"></div>
        <div class="pw-bar" id="bar3"></div>
        <div class="pw-bar" id="bar4"></div>
      </div>
    </div>
    <div class="terms-row">
      <input type="checkbox" id="reg-terms">
      <label for="reg-terms">I agree to NexaLine's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>
    <button class="btn-submit" id="register-btn" onclick="doRegister()">Create Account</button>

    <div class="divider">or continue with</div>
    
    <button class="oauth-btn" onclick="alert('Facebook login coming soon')">
      <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Continue with Facebook
    </button>
  </div>
</div>

<script>
const API = 'https://silver-giraffe-369149.hostingersite.com/api';

// ── TAB SWITCH ──
function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  hideAlert('login-alert');
  hideAlert('register-alert');
}

// ── PASSWORD TOGGLE ──
function togglePw(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

// ── PASSWORD STRENGTH ──
function checkStrength(val) {
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
  bars.forEach(b => b.className = 'pw-bar');
  if (!val) return;
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
  for (let i = 0; i < score; i++) bars[i].classList.add(cls);
}

// ── ALERT HELPERS ──
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert alert-' + type + ' show';
}
function hideAlert(id) {
  const el = document.getElementById(id);
  if (el) { el.className = 'alert'; el.textContent = ''; }
}

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');

  hideAlert('login-alert');

  if (!email || !password) {
    showAlert('login-alert', 'Please fill in your email and password.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert('login-alert', data.error || 'Invalid email or password.', 'error');
      return;
    }

    // Save session to both storages so it works across pages
    sessionStorage.setItem('nx_token', data.token);
    sessionStorage.setItem('nx_user', JSON.stringify(data.user));
    localStorage.setItem('nx_token', data.token);
    localStorage.setItem('nx_user', JSON.stringify(data.user));

    // Redirect to dashboard
    window.location.href = 'nexaline-dashboard.html';

  } catch (e) {
    showAlert('login-alert', "Couldn't reach the server. Make sure your backend is running.", 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── REGISTER ──
async function doRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const phone    = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const terms    = document.getElementById('reg-terms').checked;
  const btn      = document.getElementById('register-btn');

  hideAlert('register-alert');

  if (!name || !email || !phone || !password) {
    showAlert('register-alert', 'Please fill in all fields.', 'error');
    return;
  }
  if (password.length < 8) {
    showAlert('register-alert', 'Password must be at least 8 characters.', 'error');
    return;
  }
  if (!terms) {
    showAlert('register-alert', 'Please accept the Terms of Service to continue.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert('register-alert', data.error || 'Registration failed. Please try again.', 'error');
      return;
    }

    // Save session and redirect
    sessionStorage.setItem('nx_token', data.token);
    sessionStorage.setItem('nx_user', JSON.stringify(data.user));
    localStorage.setItem('nx_token', data.token);
    localStorage.setItem('nx_user', JSON.stringify(data.user));

    window.location.href = 'nexaline-dashboard.html';

  } catch (e) {
    showAlert('register-alert', "Couldn't reach the server. Make sure your backend is running.", 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

// ── ENTER KEY SUPPORT ──
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('form-login').classList.contains('active');
  if (loginActive) doLogin();
  else doRegister();
});

// Handle Google OAuth redirect
const urlParams = new URLSearchParams(window.location.search);
const googleToken = urlParams.get('google_token');
const googleUser = urlParams.get('user');
const googleError = urlParams.get('error');

if (googleError) {
  showAlert('Google login failed. Please try again or use email/password.', 'error');
}

if (googleToken && googleUser) {
  try {
    const user = JSON.parse(decodeURIComponent(googleUser));
    sessionStorage.setItem('nx_token', googleToken);
    sessionStorage.setItem('nx_user', JSON.stringify(user));
    localStorage.setItem('nx_token', googleToken);
    localStorage.setItem('nx_user', JSON.stringify(user));
    window.location.href = 'nexaline-dashboard.html';
  } catch(e) {
    console.error('Google login parse error:', e);
  }
}


  // Show friendly message if redirected due to session expiry
  const _msg = new URLSearchParams(window.location.search).get('msg');
  if (_msg === 'session') {
    const alertEl = document.getElementById('alert');
    if (alertEl) {
      alertEl.textContent = 'Your session expired. Please log in again.';
      alertEl.className = 'alert alert-info show';
    }
    window.history.replaceState({}, '', window.location.pathname);
  }

</script>
</body>
</html>
